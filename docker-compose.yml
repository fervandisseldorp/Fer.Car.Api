version: '3.9'

services:

  db:
    image: postgres:16
    container_name: fercar-db
    environment:
      POSTGRES_DB: fercardb
      POSTGRES_USER: fercaruser
      POSTGRES_PASSWORD: StrongPasswordHere
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fercaruser -d fercardb"]
      interval: 2s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Fer.Car.Api/Dockerfile
    container_name: fercar-api
    ports:
      - "5249:5249"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:5249
      ConnectionStrings__DefaultConnection: Host=db;Database=fercardb;Username=fercaruser;Password=StrongPasswordHere;SSL Mode=Disable

volumes:
  postgres-data: